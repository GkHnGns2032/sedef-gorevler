<style>
:root{--bg:#FAF8F5;--bg2:#F3EFE9;--card:#fff;--cb:#E8E4DE;--tx:#3A3530;--tx2:#7A7470;--tx3:#9E9890;--tx4:#C4BFB7;
--c1:#8B7BA5;--c1l:#EDE8F5;--c1d:#6B5D87;
--c2:#5B9E6B;--c2l:#E3F2E8;--c2d:#3D7A4C;
--c3:#C4896E;--c3l:#F5E8E1;--c3d:#A66B50;
--hi:#D4726A;--med:#D4A84E;--lo:#6BAA7E;--bar:#F0ECE6;
--hs:#5B7E6B;--hm:#4A6B59;--he:#C4896E}
[data-theme="dark"]{--bg:#1A1917;--bg2:#222120;--card:#2A2826;--cb:#3A3735;--tx:#E8E4DE;--tx2:#A09A92;--tx3:#7A7470;--tx4:#4A4540;
--c1l:#2E2A3D;--c2l:#2A3D32;--c3l:#3D2E26;--bar:#333130;--hs:#3D5A4C;--hm:#344D40;--he:#8B6350}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',-apple-system,sans-serif;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--tx);min-height:100dvh;max-width:520px;margin:0 auto;padding-bottom:90px;transition:background .4s,color .4s;overflow-x:hidden}
input,textarea,button,select{font-family:inherit}input::placeholder,textarea::placeholder{color:var(--tx4)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--tx4);border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes glow{0%,100%{text-shadow:0 0 8px rgba(91,126,107,.3)}50%{text-shadow:0 0 18px rgba(91,126,107,.6)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
button:active{transform:scale(.97)}

/* Popup overlay */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;animation:fadeIn .3s ease;backdrop-filter:blur(4px)}
.popup-box{background:var(--card);border-radius:24px;padding:32px 28px;text-align:center;max-width:320px;width:90%;animation:popIn .4s cubic-bezier(.2,.8,.3,1);box-shadow:0 20px 60px rgba(0,0,0,.2);border:1.5px solid var(--cb);position:relative;overflow:hidden}
.popup-box::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(91,126,107,.06),rgba(196,137,110,.06));pointer-events:none}
.popup-emoji{font-size:48px;margin-bottom:14px;display:block}
.popup-msg{font-size:15px;font-weight:600;color:var(--tx);line-height:1.6;margin-bottom:20px}
.popup-btn{padding:11px 36px;border-radius:30px;border:none;background:linear-gradient(135deg,var(--hs),var(--he));color:#fff;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit}

.header{padding:28px 22px 22px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--hs),var(--hm) 40%,var(--he));border-radius:0 0 32px 32px;color:#fff}
.header::before{content:'';position:absolute;top:-60px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%)}
.header::after{content:'🌿';position:absolute;bottom:-10px;left:10px;font-size:70px;opacity:.06}
.h-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.h-left{display:flex;align-items:center;gap:12px}
.avatar{width:50px;height:50px;border-radius:50%;border:2.5px solid rgba(255,255,255,.45);background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;overflow:hidden;flex-shrink:0;backdrop-filter:blur(8px)}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.av-upload{display:none}

<script>
const LS={get(k,f){try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch{return f}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};

const DEF_CATS={kisisel:{label:'Kişisel',icon:'💜',color:'#8B7BA5',lc:'#EDE8F5',dc:'#6B5D87',def:1},spor:{label:'Spor/Egzersiz',icon:'💪',color:'#5B9E6B',lc:'#E3F2E8',dc:'#3D7A4C',def:1},egitim:{label:'Eğitim',icon:'📚',color:'#C4896E',lc:'#F5E8E1',dc:'#A66B50',def:1}};

const QT={kisisel:['Alışveriş','Randevu al','Fatura öde','Kitap oku','Ev temizliği','Arkadaşları ara'],spor:['Yoga seansı','Koşu yap','Pilates','Nefes çalışması','Esneme rutini','Yürüyüş'],egitim:['Ders planı hazırla','Ödev kontrol et','Materyal hazırla','Sınav sorusu yaz','Veli görüşmesi','Kelime listesi oluştur']};
const QUOTES=[
{t:'Nefes al, bırak, yeniden başla. Her an yeni bir başlangıçtır.',s:'🧘‍♀️'},
{t:'Öğretmek, iki kez öğrenmektir.',s:'📚'},
{t:'Bugün yapabileceğinin en iyisini yap, yarın daha iyisini yaparsın.',s:'🌿'},
{t:'Yoga, zihnin dalgalarını durdurmaktır.',s:'🧘‍♀️'},
{t:'Bir çocuğun gözlerindeki ışık, en güzel ödüldür.',s:'📚'},
{t:'Sabır ve sevgiyle her şey mümkün.',s:'✨'},
{t:'Bedenini dinle, o sana yolu gösterecek.',s:'🧘‍♀️'},
{t:'Bilgi paylaştıkça büyür.',s:'📚'},
{t:'Küçük adımlar büyük değişimlere yol açar.',s:'🌱'},
{t:'İçindeki huzuru bul, dış dünya ona uyum sağlayacak.',s:'🧘‍♀️'},
{t:'Her gün bir şey öğreten, her gün büyüyen biridir.',s:'✨'},
{t:'En iyi öğretmen hayatın kendisidir.',s:'📚'}
];
const DN=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const DNS=['Pz','Pt','Sa','Ça','Pe','Cu','Ct'];
const MN=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
function fmtD(d){return d.getDate()+' '+MN[d.getMonth()]+' '+d.getFullYear()+', '+DN[d.getDay()]}
function greet(){const h=new Date().getHours();if(h<6)return'İyi geceler';if(h<12)return'Günaydın';if(h<18)return'İyi günler';return'İyi akşamlar'}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function todayS(){return new Date().toDateString()}
function lc(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgba('+r+','+g+','+b+',.12)'}
function dkc(hex){const r=Math.max(0,parseInt(hex.slice(1,3),16)-40),g=Math.max(0,parseInt(hex.slice(3,5),16)-40),b=Math.max(0,parseInt(hex.slice(5,7),16)-40);return'rgb('+r+','+g+','+b+')'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

// Week helpers
function getMonday(d){d=new Date(d);const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);d.setHours(0,0,0,0);return d}
function weekKey(mon){return 'wk_'+mon.toISOString().slice(0,10)}

let S={tasks:LS.get('sg_t',[]),notes:LS.get('sg_n',''),cats:LS.get('sg_c',DEF_CATS),avatar:LS.get('sg_a',''),dark:LS.get('sg_d',false),
view:'today',filter:'all',showDone:true,qi:Math.floor(Math.random()*QUOTES.length),
nt:'',nc:'kisisel',np:'medium',ntime:'',ncn:'',nci:'📌',ncc:'#6B8E7B',
showPopup:true,
weekOffset:0,weekTasks:LS.get('sg_wt',['Su içmeyi unutma','Egzersiz yap','Kitap oku','Meditasyon','Vitamin al']),weekChecks:LS.get('sg_wc',{}),newWeekTask:'',
remTaskEnabled:LS.get('sg_rte',true),remEveningEnabled:LS.get('sg_ree',true),remWeeklyEnabled:LS.get('sg_rwe',true),
remEveningTime:LS.get('sg_ret','20:00'),remWeeklyTime:LS.get('sg_rwt','09:00'),
remNotified:LS.get('sg_rn',{}),showReminder:false,reminderItems:[],reminderTitle:''};

function save(){LS.set('sg_t',S.tasks);LS.set('sg_n',S.notes);LS.set('sg_c',S.cats);LS.set('sg_a',S.avatar);LS.set('sg_d',S.dark);LS.set('sg_wt',S.weekTasks);LS.set('sg_wc',S.weekChecks);LS.set('sg_rte',S.remTaskEnabled);LS.set('sg_ree',S.remEveningEnabled);LS.set('sg_rwe',S.remWeeklyEnabled);LS.set('sg_ret',S.remEveningTime);LS.set('sg_rwt',S.remWeeklyTime);LS.set('sg_rn',S.remNotified)}

function ring(pct,sz,st,col){const r=(sz-st)/2,c=2*Math.PI*r,off=c-(pct/100)*c;const tc=S.dark?'#3A3735':'#E8E4DE';return '<svg width="'+sz+'" height="'+sz+'" style="transform:rotate(-90deg)"><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+tc+'" stroke-width="'+st+'"/><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="'+st+'" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" style="transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)"/><text x="'+sz/2+'" y="'+sz/2+'" text-anchor="middle" dominant-baseline="central" style="transform:rotate(90deg);transform-origin:center;font-size:'+(sz*.22)+'px;fill:'+col+';font-weight:700;font-family:DM Sans,sans-serif">'+Math.round(pct)+'%</text></svg>'}

// ─── Reminder System ───
function playSound(){
try{var a=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,start,dur){var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(0.3,a.currentTime+start);g.gain.exponentialRampToValueAtTime(0.01,a.currentTime+start+dur);o.start(a.currentTime+start);o.stop(a.currentTime+start+dur)}
beep(523,0,.15);beep(659,.15,.15);beep(784,.3,.25);
}catch(e){}}

function requestNotifPermission(){
if('Notification'in window&&Notification.permission==='default'){Notification.requestPermission()}}

function sendNotification(title,body,icon){
if('Notification'in window&&Notification.permission==='granted'){
try{new Notification(title,{body:body,icon:icon||'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="%235B7E6B"/><text x="50" y="64" font-size="48" text-anchor="middle" fill="white">✓</text></svg>',badge:icon,tag:'sedef-'+Date.now(),renotify:true})}catch(e){}}}

function showReminderPopup(title,items){
S.reminderTitle=title;S.reminderItems=items;S.showReminder=true;render()}

function nowHHMM(){var d=new Date();return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)}
function remKey(prefix){return prefix+'_'+todayS()}

function checkReminders(){
var now=new Date(),hhmm=nowHHMM(),td=todayS();

// 1. Task-specific reminders (tasks with time set)
if(S.remTaskEnabled){
var dueTasks=S.tasks.filter(function(t){
if(!t.tm||t.d)return false;
if(new Date(t.ca).toDateString()!==td)return false;
var rk='task_'+t.id+'_'+td;
if(S.remNotified[rk])return false;
return t.tm===hhmm;
});
if(dueTasks.length>0){
dueTasks.forEach(function(t){S.remNotified['task_'+t.id+'_'+td]=true});
save();
var items=dueTasks.map(function(t){var c=S.cats[t.c]||{icon:'📌',label:'?',color:'#888'};return{text:t.tx,color:c.color,icon:c.icon,time:t.tm}});
playSound();
sendNotification('⏰ Görev Zamanı!',dueTasks.map(function(t){return t.tx}).join(', '));
showReminderPopup('⏰ Görev Zamanı!',items);
}}

// 2. Evening reminder for incomplete tasks
if(S.remEveningEnabled&&hhmm===S.remEveningTime){
var ek=remKey('evening');
if(!S.remNotified[ek]){

function del(id){S.tasks=S.tasks.filter(function(t){return t.id!==id});save();render()}
function clrDone(){if(confirm('Tüm tamamlanan görevleri silmek istediğinize emin misiniz?')){S.tasks=S.tasks.filter(function(t){return!t.d});save();render()}}

function toggleWeek(ck){S.weekChecks[ck]=!S.weekChecks[ck];save();render()}
function addWeekTask(){var tx=S.newWeekTask.trim();if(!tx)return;S.weekTasks.push(tx);S.newWeekTask='';save();render()}
